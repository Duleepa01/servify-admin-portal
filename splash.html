<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="css/splash.css" />
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="particles" id="particles"></div>

  <main class="splash-container">
    <div class="icon-wrapper" id="iconWrapper">
      <div class="glow-ring"></div>
      <div class="pulse-ring"></div>
      <div class="icon-surface">
        <span class="material-icons-round hub-icon">hub</span>
      </div>
    </div>

    <div class="text-block">
      <h1 class="app-name" id="appName">Servify</h1>
      <p class="tagline" id="tagline">Connecting services instantly</p>
    </div>

    <div class="loader-wrap" id="loaderWrap">
      <div class="loader-track">
        <div class="loader-bar"></div>
      </div>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </main>

  <script type="module" src="js/splash.js"></script>
</body>
</html>
